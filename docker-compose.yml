version: "3.8"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: sqlserver_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      MSSQL_PID: ${MSSQL_PID:-Developer}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - sqlserver_backup:/var/opt/mssql/backup
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    restart: unless-stopped
    networks:
      - java6_backend

  app:
    build:
      context: .
    container_name: java6_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS}
      UPLOAD_PRODUCT_IMAGE_DIR: ${UPLOAD_PRODUCT_IMAGE_DIR}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    mem_limit: 1024m
    cpus: 1.0
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - java6_backend
      - java6_public

networks:
  java6_backend:
    driver: bridge
    internal: true
  java6_public:
    driver: bridge

volumes:
  sqlserver_data:
  sqlserver_backup:
