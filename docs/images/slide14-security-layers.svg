<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #0f172a; }
      .layer { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .text { font: 400 18px Arial, sans-serif; fill: #1f2937; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="70" y="80" class="title">Docker Security Layers (Defense in Depth)</text>

  <rect x="180" y="130" width="920" height="100" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="220" y="180" class="layer">Layer 1 - Supply chain</text>
  <text x="510" y="180" class="text">Pinned image + scan + ký image</text>

  <rect x="220" y="250" width="840" height="100" rx="14" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
  <text x="260" y="300" class="layer">Layer 2 - Build</text>
  <text x="470" y="300" class="text">Multi-stage + non-root + .dockerignore</text>

  <rect x="260" y="370" width="760" height="100" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="300" y="420" class="layer">Layer 3 - Runtime</text>
  <text x="530" y="420" class="text">read_only + cap_drop + no-new-privileges</text>

  <rect x="300" y="490" width="680" height="100" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="340" y="540" class="layer">Layer 4 - Operations</text>
  <text x="590" y="540" class="text">Secrets + monitor + backup + patch cycle</text>
</svg>
