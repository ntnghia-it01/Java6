<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 24px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 18px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#f8fafc"/>
  <text x="70" y="80" class="title">Java6 Docker Compose Architecture</text>

  <rect x="100" y="220" width="250" height="220" rx="20" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="160" y="290" class="label">Client</text>
  <text x="130" y="330" class="sub">Web / Postman</text>

  <rect x="500" y="180" width="300" height="300" rx="20" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="560" y="250" class="label">java6_app</text>
  <text x="570" y="285" class="sub">Spring Boot</text>
  <text x="550" y="315" class="sub">Port 8080</text>

  <rect x="920" y="220" width="280" height="220" rx="20" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
  <text x="980" y="290" class="label">sqlserver_db</text>
  <text x="975" y="330" class="sub">MSSQL 2022</text>

  <line x1="350" y1="330" x2="500" y2="330" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="800" y1="330" x2="920" y2="330" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="450" y="540" width="400" height="80" rx="14" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="588" class="label">Network: java6_network</text>
</svg>
