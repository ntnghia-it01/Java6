<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1e293b"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 24px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 400 20px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#f8fafc"/>
  <text x="70" y="80" class="title">Environment-specific Startup Flow</text>

  <rect x="90" y="220" width="300" height="250" rx="20" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="180" y="290" class="label">.env.dev</text>
  <text x="140" y="330" class="sub">DB_HOST=sqlserver</text>
  <text x="160" y="365" class="sub">SPRING_PROFILES_ACTIVE=docker</text>

  <rect x="490" y="220" width="300" height="250" rx="20" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
  <text x="570" y="290" class="label">Compose</text>
  <text x="525" y="330" class="sub">docker-compose.yml</text>
  <text x="530" y="365" class="sub">--env-file chọn biến</text>

  <rect x="890" y="220" width="300" height="250" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="980" y="290" class="label">Containers</text>
  <text x="930" y="330" class="sub">java6_app + sqlserver_db</text>
  <text x="950" y="365" class="sub">chạy theo môi trường</text>

  <line x1="390" y1="345" x2="490" y2="345" stroke="#1e293b" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="790" y1="345" x2="890" y2="345" stroke="#1e293b" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
